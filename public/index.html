<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#090909" />
    <meta name="description" content="AI Interview Trainer Agent — Practice with AI-powered mock interviews, get resume analysis, and track your progress. Built with IBM Granite." />

    <!-- SEO -->
    <meta name="keywords" content="AI interview, mock interview, resume analysis, IBM Granite, interview preparation, ATS score" />
    <meta name="author" content="InterviewAI" />
    <meta property="og:title" content="InterviewAI — Master Every Interview with AI" />
    <meta property="og:description" content="AI-powered mock interviews and resume analysis platform." />
    <meta property="og:type" content="website" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.svg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts: Nunito (display), Inter (body), JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>

    <title>InterviewAI — AI Interview Trainer</title>
  </head>
