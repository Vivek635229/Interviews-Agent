# ═══════════════════════════════════════════════════════════════
# Render Blueprint — Backend Deployment
# https://render.com/docs/blueprint-spec
# ═══════════════════════════════════════════════════════════════

services:
  - type: web
    name: interviews-agent-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: IBM_API_KEY
        sync: false
      - key: IBM_PROJECT_ID
        sync: false
      - key: IBM_AUTH_URL
        value: https://iam.cloud.ibm.com/identity/token
      - key: IBM_WATSONX_URL
        value: https://us-south.ml.cloud.ibm.com/ml/v1/text/generation?version=2024-05-31
      - key: IBM_MODEL_ID
        value: ibm/granite-3-8b-instruct
      - key: CLIENT_URL
        value: https://interviews-agent-application.vercel.app
